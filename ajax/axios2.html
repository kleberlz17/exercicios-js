<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Axios #02</title>
    <link rel="stylesheet" href="css/estilo.css" />
    <script src="js/axios.js"></script>
  </head>

  <body class="conteudo exercicio">
    <h1>Axios Get/Post</h1>
    <div id="get"></div>
    <div id="post"></div>

    <script>
      //Axios é mais moderno e utilizado com React.
      //Mais simples que o fetch
      function exibirResultado(id, dados) {
        const texto = JSON.stringify(dados);
        document.getElementById(id).innerHTML = texto;
      }
      // axios("parOuImpar?numero=10").then(resp => exibirResultado)

      axios //parOuImpar do server.js
        .get("parOuImpar", {
          params: {
            numero: 6,
          },
        })
        .then((resp) => exibirResultado("get", resp.data));

      axios //formulario do server.js
        .post("formulario", {
          nome: "Kleber Luiz",
          sobrenome: "Ferreira",
        })
        .then((resp) => exibirResultado("post", resp.data));
    </script>
  </body>
</html>
