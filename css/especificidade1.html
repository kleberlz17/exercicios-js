<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Especificidade CSS</title>
    <style>
      /* https://developer.mozilla.org/pt-BR/docs/Web/CSS/Specificity */

      /*
        Em linhas gerais (ordem)
         1. regra com !important
         2. seletores mais específicos
         3. última regra processada ( em caso de empate) ex: p.observacao / p[teste]
         NESTA ORDEM ABAIXO, OS MAIS "FORTES" SE SOBREPOEM SOBRE OUTROS.
         EX: O primeiro está sendo sobreposto pelo segundo, e assim segue.
      */

      p {
        background-color: #aaa;
      }

      .observacao {
        background-color: #5f5;
        border: dashed 5px;
        padding: 200px;
        font-size: 40px;
      }

      p.observacao {
        padding: 2px;
        background: linear-gradient(to right, red, yellow);
      }
    </style>
  </head>

  <body>
    <p class="observacao">Olha essa observação!!!!</p>
  </body>
</html>
