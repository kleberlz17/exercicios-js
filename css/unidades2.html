<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Unidades #02</title>
    <style>
      .fora {
        position: relative;
        background-color: orange;
        width: 400px;
        height: 400px;
        padding: 50px;
      }

      .dentro {
        background-color: mediumvioletred;
        height: 100px;
        width: 100%;
        position: static; /*  ocupando espaço do conteudo */
        position: relative; /*  ocupando espaço do conteudo */
        position: absolute; /* nesse caso vai ultrapassar o conteudo (conteudo + padding) */
        position: fixed; /* aqui vai mais ainda (tamanho do viewport)*/
      }
    </style>
  </head>
  <body>
    <div class="fora">
      <div class="dentro"></div>
    </div>
  </body>
</html>
