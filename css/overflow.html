<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Overflow</title>
    <style>
      div {
        font-size: 40px;
        height: 100px;
        width: 260px;
        border: solid 3px;
        overflow: hidden; /*tudo q extrapolar o espaço vai desaparecer*/
        overflow: scroll; /*o nome ja diz */
        overflow-x: scroll; /*scroll de um lado*/
      }
    </style>
  </head>
  <body>
    <div>
      TudoFuncionaMuitoBemEmCSS!!! Texto muito grande para caber nessa div. Já
      pensou qual será o comportamento padrão?
    </div>
  </body>
</html>
