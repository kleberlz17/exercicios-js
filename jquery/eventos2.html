<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <title>Eventos #02</title>
    <link rel='stylesheet' href='css/estilo.css'>
    <script src='js/jquery.js'></script>
    <style>
        input {
            font-size: 2em;
        }
    </style>
</head>

<body class='conteudo exercicio'>
    <h1>Eventos #02</h1>
    <div id='div1'>1</div>
    <div id="resultado1">?</div>
    <br>
    <input type="text" placeholder="Digite e Selecione">
    <div id="resultado2">?</div>
    <script>
        //Colocou mouse na div 1, estilo.css destaque, tirou o mouse, ele sai.
        const alternarDestaque = () => $("#div1").toggleClass("destaque")
        // $("#div1").on("mouseenter mouseleave", alternarDestaque)
        $("#div1").hover(alternarDestaque, alternarDestaque)

        //Aviso ao passar o mouse na div1
        $("#div1").one("mouseenter", e => alert("Aviso IMPORTANTE: Obrigado."))

        //Click 2 vezes, div 1 some e reaparece 1 seg depois
        $("#div1").dblclick(e => $("#div1").fadeOut(1000).fadeIn(1000))

        //redimensiona a partir do tamanho da janela
        $(window).resize(function(e) {
            const l = $(window).width()
            const a = $(window).height()
            $("#resultado1").html(`Largura: ${l} e Altura: ${a}`)
        })

        //Digitar na caixa de texto, ao selecionar com o mouse as letras, vai mostrar embaixo.
        $(":input").select(e => {
            const inicio = e.target.selectionStart
            const fim = e.target.selectionEnd
            $("#resultado2").html(e.target.value.substring(inicio, fim))
        })
    </script>
</body>
